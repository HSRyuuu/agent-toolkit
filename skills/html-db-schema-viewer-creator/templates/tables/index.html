<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tables — Schema Explorer</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body data-page="tables">
<nav id="topnav"></nav>

<main class="page">
  <div class="breadcrumb">
    <a href="../index.html">Dashboard</a> / Tables
  </div>

  <h1>Tables <span class="meta" id="metaSummary"></span></h1>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
      <line x1="9.8" y1="9.8" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="searchInput" placeholder="이름, 코멘트, 컬럼 검색...">
  </div>

  <div class="section" style="padding: 0;">
    <table class="data" id="tablesTable">
      <thead>
        <tr>
          <th class="sortable" data-sort="name">Table</th>
          <th class="sortable" data-sort="comment">Comment</th>
          <th class="sortable" data-sort="columns" style="width: 90px;">Cols</th>
          <th class="sortable" data-sort="indexes" style="width: 90px;">Idx</th>
          <th class="sortable" data-sort="incoming" style="width: 90px;">In</th>
          <th class="sortable" data-sort="outgoing" style="width: 90px;">Out</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<script src="../assets/schema.js"></script>
<script src="../assets/schema-normalize.js"></script>
<script src="../assets/nav.js"></script>
<script src="../assets/tables.js"></script>
</body>
</html>
